<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/WA_favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Link Generator</title>
    <!-- Link to the manifest file for PWA/APK support -->
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-slate-800">

    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full">
        <div class="flex flex-col items-center mb-6">
            <div class="bg-green-100 p-4 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.438 9.884-9.89 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Quick Message</h1>
            <p class="text-gray-500 text-sm text-center">Enter a phone number to start a chat without saving to contact.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="phone" class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Phone Number</label>
                <input 
                    type="text" 
                    id="phone" 
                    placeholder="e.g. 0547732069" 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all font-mono"
                >
            </div>

            <button 
                onclick="redirectToWhatsApp()"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-green-200 transform active:scale-95 transition-all flex items-center justify-center gap-2"
            >
                Open WhatsApp
            </button>
            
            <p id="errorMsg" class="text-red-500 text-xs text-center hidden">Please enter a valid string/number.</p>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">By Ram H.</p>
            <p class="text-xs font-mono text-gray-500 mt-1 truncate"><span id="preview">...</span></p>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phone');
        const preview = document.getElementById('preview');
        const errorMsg = document.getElementById('errorMsg');

        // Logic to clean the string: remove non-alphanumeric and trim leading zeros
        function getCleanValue(val) {
            // 1. Remove non-alphanumeric characters (spaces, dashes, plus, etc.)
            let cleaned = val.replace(/[^a-zA-Z0-9]/g, '');
            // 2. Remove leading zeros
            cleaned = cleaned.replace(/^0+/, '');
            return cleaned;
        }

        // Live preview
        phoneInput.addEventListener('input', (e) => {
            const cleanValue = getCleanValue(e.target.value);
            preview.textContent = cleanValue || '...';
            errorMsg.classList.add('hidden');
        });

        function redirectToWhatsApp() {
            const rawValue = phoneInput.value;
            
            if (!rawValue.trim()) {
                errorMsg.classList.remove('hidden');
                return;
            }

            const cleanString = getCleanValue(rawValue);

            if (!cleanString) {
                errorMsg.classList.remove('hidden');
                return;
            }

            // Construct the WhatsApp URL
            const url = `https://wa.me/${cleanString}`;

            // Redirect to the address
            window.location.href = url;
        }

        // Allow pressing "Enter" to trigger
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                redirectToWhatsApp();
            }
        });
    </script>
</body>
</html>
